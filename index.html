<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Tiles</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #1a0033, #330066);
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #menu, #game-container {
            width: 380px;
        }
        h1 {
            font-size: 42px;
            margin: 10px;
            text-shadow: 0 0 20px #ff00ff;
        }
        .song-btn {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            font-size: 18px;
            background: linear-gradient(45deg, #6b00b3, #ff00ff);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
            transition: all 0.2s;
        }
        .song-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.9);
        }
        #game-container {
            position: relative;
            width: 360px;
            height: 640px;
            border: 8px solid #ff00ff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.8);
            display: none;
        }
        canvas {
            display: block;
            background: #000;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff00ff;
            z-index: 20;
        }
        #level {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            z-index: 20;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            font-size: 16px;
            z-index: 30;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(#ff00ff, #aa00aa);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="menu">
        <h1>✨ Declans Game ✨</h1>
        <p style="margin-bottom: 30px;">Choose a track</p>
        
        <button class="song-btn" onclick="startWithSong(0)">1. Pretty Green Eyes</button>
        <button class="song-btn" onclick="startWithSong(1)">2. The Chemical Brothers -Go</button>
        <button class="song-btn" onclick="startWithSong(2)">3. Cyber Groove</button>
        <button class="song-btn" onclick="startWithSong(3)">4. Midnight Run</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-container">
        <canvas id="canvas" width="360" height="640"></canvas>
        
        <div id="score">0</div>
        <div id="level">Level 1</div>
        <button id="back-btn" onclick="backToMenu()">← Menu</button>

        <!-- Game Over -->
        <div id="game-over" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50;">
            <h2>GAME OVER</h2>
            <p id="final-score" style="font-size: 28px;">Score: 0</p>
            <button onclick="restartCurrentSong()">PLAY AGAIN</button>
            <button onclick="backToMenu()" style="margin-top: 15px; background: #555;">BACK TO MENU</button>
        </div>
    </div>

    <audio id="bg-music" loop></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bg-music');
        
        const WIDTH = 360;
        const HEIGHT = 640;
        const LANE_WIDTH = WIDTH / 4;
        const TILE_HEIGHT = 110;
        
        let tiles = [];
        let score = 0;
        let gameRunning = false;
        let speed = 4.5;
        let level = 1;
        let lastTime = 0;
        let spawnTimer = 0;
        let lastSpeedIncrease = 0;
        let currentSongIndex = -1;
        
        const colors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff88'];
        
        const songs = [
            { name: "Pretty Green Eyes", url: "PrettyGreenEyes.mp3" },   // Your file - place it in the same folder
            { name: "The Chemical Brothers - Go", url: "The Chemical Brothers - Go.mp3" },  // Your file - place it in the same folder
            { name: "Cyber Groove", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { name: "Midnight Run", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
        ];
        
        class Tile {
            constructor(lane) {
                this.lane = lane;
                this.x = lane * LANE_WIDTH;
                this.y = -TILE_HEIGHT;
                this.width = LANE_WIDTH - 6;
                this.height = TILE_HEIGHT;
                this.active = true;
                this.color = colors[lane];
            }
            update() { this.y += speed; }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 25;
                ctx.fillRect(this.x + 3, this.y, this.width, this.height);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 5;
                ctx.shadowBlur = 15;
                ctx.strokeRect(this.x + 6, this.y + 6, this.width - 6, this.height - 12);
            }
        }
        
        function drawLanes() {
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 3;
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(i * LANE_WIDTH, 0);
                ctx.lineTo(i * LANE_WIDTH, HEIGHT);
                ctx.stroke();
            }
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 8;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(0, HEIGHT * 0.78);
            ctx.lineTo(WIDTH, HEIGHT * 0.78);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        function spawnTile() {
            const lane = Math.floor(Math.random() * 4);
            tiles.push(new Tile(lane));
        }
        
        function update(delta) {
            if (!gameRunning) return;
            
            const now = Date.now();
            
            // Increase speed every 5 seconds
            if (now - lastSpeedIncrease > 10000) {
                speed += 3.5;
                level++;
                lastSpeedIncrease = now;
                document.getElementById('level').textContent = `Level ${level}`;
            }
            
            spawnTimer += delta;
            if (spawnTimer > 520) {
                spawnTile();
                spawnTimer = 0;
            }
            
            for (let i = tiles.length - 1; i >= 0; i--) {
                const tile = tiles[i];
                tile.update();
                if (tile.y > HEIGHT + 50) {
                    tiles.splice(i, 1);
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = 'rgba(10, 0, 30, 0.95)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            drawLanes();
            
            for (let tile of tiles) {
                if (tile.active) tile.draw();
            }
            document.getElementById('score').textContent = score;
        }
        
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;
            update(delta);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function handleTap(clientX, clientY) {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            for (let i = tiles.length - 1; i >= 0; i--) {
                const t = tiles[i];
                if (t.active && x > t.x && x < t.x + t.width && y > t.y && y < t.y + t.height) {
                    t.active = false;
                    score += 10;
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.fillRect(t.x, t.y, t.width, t.height);
                    return;
                }
            }
        }
        
        function startWithSong(index) {
            currentSongIndex = index;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            const song = songs[index];
            audio.src = song.url;
            audio.load();
            
            // Try to play (works best when user has interacted)
            audio.play().catch(err => {
                console.log("Autoplay prevented. Tap screen to start music.");
            });
            
            resetGame();
        }
        
        function resetGame() {
            gameRunning = true;
            score = 0;
            speed = 4.5;
            level = 1;
            tiles = [];
            spawnTimer = 0;
            lastSpeedIncrease = Date.now();
            document.getElementById('level').textContent = `Level ${level}`;
            document.getElementById('game-over').style.display = 'none';
        }
        
        function restartCurrentSong() {
            if (currentSongIndex >= 0) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            }
            resetGame();
        }
        
        function gameOver() {
            gameRunning = false;
            audio.pause();
            document.getElementById('final-score').textContent = `Score: ${score}`;
            document.getElementById('game-over').style.display = 'flex';
        }
        
        function backToMenu() {
            gameRunning = false;
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game-over').style.display = 'none';
            tiles = [];
        }
        
        // Input handlers
        canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            handleTap(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            let lane = -1;
            switch(e.key.toLowerCase()) {
                case 'a': lane = 0; break;
                case 's': lane = 1; break;
                case 'd': lane = 2; break;
                case 'f': lane = 3; break;
            }
            if (lane === -1) return;
            for (let i = tiles.length - 1; i >= 0; i--) {
                const t = tiles[i];
                if (t.active && t.lane === lane) {
                    t.active = false;
                    score += 10;
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillRect(t.x, t.y, t.width, t.height);
                    break;
                }
            }
        });
        
        // Missed tile detection
        setInterval(() => {
            if (!gameRunning) return;
            for (let tile of tiles) {
                if (tile.active && tile.y > HEIGHT + 30) {
                    gameOver();
                    return;
                }
            }
        }, 80);
        
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
